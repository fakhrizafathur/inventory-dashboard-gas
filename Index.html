<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <?!= include('Style'); ?>
</head>

<body class="light-mode">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="#">
      <i class="bi bi-box-seam"></i>
      Inventory Dashboard
    </a>

    <button class="btn btn-light" id="themeToggle">
      <i class="bi bi-moon"></i>
    </button>

  </div>
</nav>

<div class="container py-4">

  <!-- SUMMARY -->
  <div class="row g-4 mb-4">

    <div class="col-md-3">
      <div class="summary-card">
        <div>
          <h6>Total Article</h6>
          <h2 id="totalArticle">0</h2>
        </div>

        <i class="bi bi-box icon"></i>
      </div>
    </div>

    <div class="col-md-3">
      <div class="summary-card">
        <div>
          <h6>Total Qty</h6>
          <h2 id="totalQty">0</h2>
        </div>

        <i class="bi bi-exclamation-triangle icon"></i>
      </div>
    </div>

    <div class="col-md-2">
      <div class="summary-card">
        <div>
          <h6>Input</h6>
          <h2 id="inputCount">0</h2>
        </div>

        <i class="bi bi-arrow-down-circle icon"></i>
      </div>
    </div>

    <div class="col-md-2">
      <div class="summary-card">
        <div>
          <h6>Output</h6>
          <h2 id="outputCount">0</h2>
        </div>

        <i class="bi bi-arrow-up-circle icon"></i>
      </div>
    </div>

    <div class="col-md-2">
      <div class="summary-card">
        <div>
          <h6>Pending</h6>
          <h2 id="pendingCount">0</h2>
        </div>

        <i class="bi bi-clock-history icon"></i>
      </div>
    </div>

  </div>

  <!-- FORM -->
  <div class="card border-0 shadow-sm mb-4">

    <div class="card-header bg-transparent">
      <h5 class="mb-0">
        <i class="bi bi-plus-circle"></i>
        Add Inventory
      </h5>
    </div>

    <div class="card-body">

      <form id="dataForm" class="row g-3">

        <input type="hidden" name="rowIndex">
        <input type="hidden" name="id">

        <div class="col-md-3">
          <input type="date"
            name="date"
            class="form-control"
            required>
        </div>

        <div class="col-md-3">
          <input type="text"
            name="season"
            class="form-control"
            placeholder="Season"
            required>
        </div>

        <div class="col-md-3">
          <input type="text"
            name="product"
            class="form-control"
            placeholder="Product Name"
            required>
        </div>

        <div class="col-md-3">
          <input type="text"
            name="article"
            class="form-control"
            placeholder="Article"
            required>
        </div>

        <div class="col-md-3">
          <input type="text"
            name="stage"
            class="form-control"
            placeholder="Stage"
            required>
        </div>

        <div class="col-md-2">
          <input type="text"
            name="size"
            class="form-control"
            placeholder="Size"
            required>
        </div>

        <div class="col-md-2">
          <input type="number"
            name="qty"
            class="form-control"
            placeholder="Qty"
            required>
        </div>

        <div class="col-md-2">
          <input type="text"
            name="lacking"
            class="form-control"
            placeholder="Lacking"
            required>
        </div>

        <div class="col-md-3">
          <select name="status"
            class="form-select">

            <option value="Input">Input</option>
            <option value="Output">Output</option>
            <option value="Pending">Pending</option>

          </select>
        </div>

        <div class="col-md-12">
          <button class="btn btn-primary">
            <i class="bi bi-save"></i>
            Save Data
          </button>
        </div>

      </form>

    </div>

  </div>

  <!-- TABLE -->
  <div class="card border-0 shadow-sm">

    <div class="card-header bg-transparent">

      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">

        <h5 class="mb-0">
          <i class="bi bi-table"></i>
          Inventory Data
        </h5>

        <div class="d-flex gap-2 flex-wrap">

          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Search product/article..."
            style="width:250px;">

          <select
            id="statusFilter"
            class="form-select">

            <option value="">All Status</option>
            <option value="Input">Input</option>
            <option value="Output">Output</option>
            <option value="Pending">Pending</option>

          </select>

          <select id="rowsPerPageSelect"
            class="form-select">

            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>

          </select>

        </div>

      </div>

    </div>

    <div class="card-body">

      <div id="loadingSpinner"
          class="text-center py-5 d-none">

          <div class="spinner-border text-primary"
            role="status">
          </div>

          <p class="mt-3">Loading data...</p>

      </div>

      <div class="table-responsive">

        <table class="table table-hover align-middle">

          <thead class="table-primary">

            <tr>
              <th>Date</th>
              <th>Season</th>
              <th>Product</th>
              <th>Article</th>
              <th>Stage</th>
              <th>Size</th>
              <th>Qty</th>
              <th>Lacking</th>
              <th>Status</th>
              <th width="150">Action</th>
            </tr>

          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

      <div id="pagination"
        class="d-flex gap-2 mt-3 flex-wrap">
      </div>

    </div>

  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          Edit Inventory
        </h5>

        <button type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body">

        <form id="editForm" class="row g-3">

          <input type="hidden" name="rowIndex">
          <input type="hidden" name="id">

          <div class="col-md-6">
            <input type="date"
              name="date"
              class="form-control"
              required>
          </div>

          <div class="col-md-6">
            <input type="text"
              name="season"
              class="form-control"
              placeholder="Season"
              required>
          </div>

          <div class="col-md-6">
            <input type="text"
              name="product"
              class="form-control"
              placeholder="Product"
              required>
          </div>

          <div class="col-md-6">
            <input type="text"
              name="article"
              class="form-control"
              placeholder="Article"
              required>
          </div>

          <div class="col-md-4">
            <input type="text"
              name="stage"
              class="form-control"
              placeholder="Stage"
              required>
          </div>

          <div class="col-md-4">
            <input type="text"
              name="size"
              class="form-control"
              placeholder="Size"
              required>
          </div>

          <div class="col-md-4">
            <input type="number"
              name="qty"
              class="form-control"
              placeholder="Qty"
              required>
          </div>

          <div class="col-md-4">
            <input type="text"
              name="lacking"
              class="form-control"
              placeholder="Lacking"
              required>
          </div>

          <div class="col-md-4">
            <select name="status"
              class="form-select">

              <option value="Input">Input</option>
              <option value="Output">Output</option>
              <option value="Pending">Pending</option>

            </select>
          </div>

        </form>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary"
          data-bs-dismiss="modal">
          Close
        </button>

        <button class="btn btn-primary"
          onclick="submitEdit()">
          Update Data
        </button>

      </div>

    </div>
  </div>
</div>
<?!= include('JavaScript'); ?>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
